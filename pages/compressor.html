<!DOCTYPE html>
<html lang="en">
	<head>
		<!--===== Meta Tags ======-->
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<!--===== Title ======-->
		<title>Image Compressor - Reduce Image Size Online | BS Image Tools</title>
		
		<!--===== Meta Tags ======-->
		<meta name="title" content="Image Compressor - Compress Images Online Without Losing Quality | BS Image Tools">
		<meta name="description" content="Compress JPG, PNG and WEBP images online while maintaining quality. Reduce image size instantly in your browser.">
		<meta name="keywords" content="image compressor, compress image online, reduce image size, jpg compressor, png compressor, webp compressor">
		<meta name="author" content="BS Image Tools">
		<meta name="robots" content="index, follow">
		<meta name="language" content="English">
		<meta name="theme-color" content="#2563eb">
		<meta name="application-name" content="BS Image Tools">

		<!--===== Open Graph ======-->
		<meta property="og:type" content="website">
		<meta property="og:title" content="Image Compressor - Reduce Image Size Online">
		<meta property="og:description" content="Reduce image file size while maintaining image quality.">
		<meta property="og:site_name" content="BS Image Tools">

		<!--===== Twitter ======-->
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="Image Compressor | BS Image Tools">
		<meta name="twitter:description" content="Compress images online for free without losing quality.">
		
		<!--===== Links ======-->
		<link rel="stylesheet" href="../css/style.css">

		<link rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
		
		<!--===== Script Tags ======-->
		<script src="../js/navbar.js" defer></script>
		<script src="../js/footer-year.js" defer></script>
		<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
		<script src="../js/compressor.js" defer></script>
		
		<!--===== Structured Data ======-->
		<script type="application/ld+json">
		{
		  "@context":"https://schema.org",
		  "@type":"WebApplication",
		  "name":"Image Compressor",
		  "applicationCategory":"UtilitiesApplication",
		  "operatingSystem":"Any",
		  "description":"Compress JPG, PNG and WEBP images online while keeping quality."
		}
		</script>
	</head>

	<body>
		
		<!--====== Navbar =======-->
		<header class="navbar">
			<div class="nav-container">
				<!--===== Brand Logo ======-->
				<a href="../index.html" class="brand">
					<div class="logo-box">BS</div>
					<span>
						Image Tools
					</span>
				</a>
				
				<!--===== Hamburger Mobile Menu ======-->
				<button type="button" class="menu-toggle" id="menuToggle"
				aria-label="Open Menu">
					<i class="fa-solid fa-bars"></i>
				</button>
				
				<!--===== Navigation For Pages ======-->
				<nav class="nav-menu" id="navMenu" aria-label="Main Navigation">
					<a href="../index.html">Home</a>
					<a href="convert.html">Convert</a>
					<a href="compressor.html">Compress</a>
					<a href="image-to-pdf.html">Image to PDF</a>
				</nav>
			</div>
		</header>

		<main class="tool-page">
			<section class="container">
				<!--==== Main Heading =====-->
				<h1>Image Compressor</h1>
				<p>Reduce image size while keeping quality.</p>
				
				<!--===== Image Upload From User ======-->
				<div class="upload-box">
					<label for="compressInput">
						<i class="fa-solid fa-image"></i>
						<br>
						Choose Image
					</label>
					<input type="file" id="compressInput" accept="image/*" hidden><p id="compressError"></p>
				</div>

				<!--====== Uploaded Image View Port =======-->
				<!--====== Tool Layout ======-->
				<div class="tool-layout">
				
					<!--=== Original Image ===-->
					<div class="original-box">
						
						<!--=== Cross/Remove Selected Image Button  ===-->
						<button type="button" id="removeImage" class="remove-btn" hidden>
							<i class="fa-solid fa-xmark"></i>
						</button>
						
						<!--=== Original Image Viewer ===-->
						<h3>Original Image</h3>
						<img id="originalPreview"alt="Original image preview">
						<p id="compressOriginalInfo"></p>
					</div>

					<!--==== Controls ====-->
					<div class="controls-box">
						<div class="controls">
							
							<!--==== Set Image Quality ====-->
							<label>Quality:
								<span id="qualityValue">80%</span>
								<input type="range"id="qualityRange"min="10"max="100"value="80">
							</label>
							
							<!--==== Set Image Size ====-->
							<label>Target Size (KB)
								<!--==== Option 1 Range ====-->
								<input type="range"id="compressSizeRange"min="10"max="5000"value="500">
								<!--==== Option 2 Number ====-->
								<input type="number"id="compressSizeInput"value="500"min="10"max="5000">
							</label>
						</div>
					</div>

					<!--==== Button ====-->
					<div class="button-box">
						<button type="button"class="btn"id="compressBtn" disabled>Compress Image</button>
						<button type="button"class="btn"id="downloadBtn"hidden disabled>Download</button>
						
						<div id="compressLoader" hidden>Compressing...</div>
					</div>

					<!--=== Compressed Image ====-->
					<div class="result-box">
						<!--=== Compressed Image Viewer ===-->
						<h3>Compressed Image</h3>
						<img id="compressPreview"alt="Compressed image preview">
						<p id="compressInfo"></p>
					</div>
				</div>

			</section>
		</main>

		<!--====== Footer =======-->
		<footer class="footer">
			<div class="footer-container">
				
				<!--====== Left Side =======-->
				<div>
					<h3>BS Image Tools</h3>
					<p>Convert • Compress • PDF Tools</p>
				</div>
				<!--====== Right Side =======-->
				<div>
					<p>© <span id="year"></span> BS Image Tools</p>
					<p>All Rights Reserved.</p>
				</div>
				
			</div>
		</footer>
		
	</body>
</html>
