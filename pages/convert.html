<!DOCTYPE html>
<html lang="en">
	<head>
		<!--===== Meta Tags ======-->
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<!--===== Title ======-->
		<title>Image Converter - Convert JPG, PNG & WEBP Online | BS Image Tools</title>
		
		<!--===== Meta Tags ======-->
		<meta name="title" content="Image Converter - Convert JPG, PNG & WEBP Online Free | BS Image Tools">
		<meta name="description" content="Convert JPG, PNG and WEBP images online for free. Fast, secure and browser-based image converter with no uploads or registration required.">
		<meta name="keywords" content="image converter, jpg to png, png to jpg, webp converter, convert image online, free image converter">
		<meta name="author" content="BS Image Tools">
		<meta name="robots" content="index, follow">
		<meta name="language" content="English">
		<meta name="theme-color" content="#2563eb">
		<meta name="application-name" content="BS Image Tools">

		<!--===== Open Graph ======-->
		<meta property="og:type" content="website">
		<meta property="og:title" content="Image Converter - Convert JPG, PNG & WEBP Online">
		<meta property="og:description" content="Convert JPG, PNG and WEBP images online quickly and securely.">
		<meta property="og:site_name" content="BS Image Tools">

		<!--===== Twitter ======-->
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="Image Converter | BS Image Tools">
		<meta name="twitter:description" content="Free online image converter supporting JPG, PNG and WEBP.">
		
		<!--===== Links ======-->
		<link rel="stylesheet" href="../css/style.css">

		<link rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
		
		<!--===== Script Tags ======-->
		<script src="../js/navbar.js" defer></script>
		<script src="../js/footer-year.js" defer></script>
		<script src="../js/converter.js" defer></script>
		
		<!--===== Structured Data ======-->
		<script type="application/ld+json">
		{
		  "@context":"https://schema.org",
		  "@type":"WebApplication",
		  "name":"Image Converter",
		  "applicationCategory":"UtilitiesApplication",
		  "operatingSystem":"Any",
		  "description":"Convert JPG, PNG and WEBP images online for free."
		}
		</script>
	</head>

	<body>
		
		<!--====== Navbar =======-->
		<header class="navbar">
			<div class="nav-container">
				<!--===== Brand Logo ======-->
				<a href="../index.html" class="brand">
					<div class="logo-box">BS</div>
					<span>
						Image Tools
					</span>
				</a>
				
				<!--===== Hamburger Mobile Menu ======-->
				<button type="button" class="menu-toggle" id="menuToggle"
				aria-label="Open Menu">
					<i class="fa-solid fa-bars"></i>
				</button>
				
				<!--===== Navigation For Pages ======-->
				<nav class="nav-menu" id="navMenu" aria-label="Main Navigation">
					<a href="../index.html">Home</a>
					<a href="convert.html">Convert</a>
					<a href="compressor.html">Compress</a>
					<a href="image-to-pdf.html">Image to PDF</a>
				</nav>
			</div>
		</header>

		<main class="tool-page">
			<section class="container">
				
				<!--===== Main Heading ======-->
				<h1>Image Converter</h1>
				<p>Convert JPG, PNG and WEBP images with optimized quality.</p>

				<!--===== Image Upload From User ======-->
				<div class="upload-box">
					<label for="converterInput">
						<i class="fa-solid fa-cloud-arrow-up"></i>
						<br>
						Choose Image
					</label>
					<input type="file"id="converterInput"accept="image/*"hidden>
					<p id="converterError"></p>
				</div>
				
				<!--====== Uploaded Image View Port =======-->
				<!--====== Tool Layout ======-->
				<div class="tool-layout">
				
					<!--=== Original Image ===-->
					<div class="original-box">
					
						<!--=== Cross/Remove Selected Image Button  ===-->
						<button type="button" id="removeImage" class="remove-btn" hidden>
							<i class="fa-solid fa-xmark"></i>
						</button>
						
						<!--=== Original Image Viewer ===-->
						<h3>Original Preview</h3>
						<img id="originalPreview"alt="Original image preview">
						<p id="originalInfo"></p>
					</div>
					
					<!--=== Format ===-->
					<div class="controls-box">
						<div class="controls">
							<!--=== Format Select Box ===-->
							<label>Format
								<select id="formatSelect" disabled>
									<option value="image/jpeg">JPG</option>
									<option value="image/png">PNG</option>
									<option value="image/webp">WEBP</option>
								</select>
							</label>
						</div>
					</div>

					<!--=== Buttons ===-->
					<div class="button-box">
						<button type="button"class="btn" id="convertBtn" disabled>Convert Image</button>
						<button type="button"class="btn" id="downloadBtn" hidden disabled>Download</button>

						<div id="loader" hidden>Processing...</div>
					</div>

					<!--=== Converted Image ===-->
					<div class="result-box">
						<!--=== Converted Image Viewer ===-->
						<h3>Converted Preview</h3>
						<img id="convertedPreview"alt="Converted image preview">
						<p id="convertedInfo"></p>
					</div>
				</div>
				
			</section>
		</main>

		<!--====== Footer =======-->
		<footer class="footer">
			<div class="footer-container">
				
				<!--====== Left Side =======-->
				<div>
					<h3>BS Image Tools</h3>
					<p>Convert • Compress • PDF Tools</p>
				</div>
				<!--====== Right Side =======-->
				<div>
					<p>© <span id="year"></span> BS Image Tools</p>
					<p>All Rights Reserved.</p>
				</div>
				
			</div>
		</footer>
		
	</body>
</html>
